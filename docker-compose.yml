services:
  postgres:
    image: postgres:16-alpine
    container_name: doctor_oop_postgres
    environment:
      POSTGRES_DB: doctor_oop
      POSTGRES_USER: doctor_app
      POSTGRES_PASSWORD: doctor_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doctor_app -d doctor_oop"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: doctor_oop_backend
    environment:
      DATABASE_URL: postgresql://doctor_app:doctor_app@postgres:5432/doctor_oop
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: doctor_oop_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres_data:
